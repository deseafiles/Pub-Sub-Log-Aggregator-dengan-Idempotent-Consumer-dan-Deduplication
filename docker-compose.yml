version: "3.9"

services:
  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-aggregator
    ports:
      - "8080:8080"
    volumes:
      - dedup_data:/app/data
    environment:
      - DEDUP_DB_PATH=/app/data/dedup.db
      - PYTHONUNBUFFERED=1
    networks:
      - aggnet
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  publisher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-publisher
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      python -m src.publisher
        --host http://aggregator:8080
        --total 5000
        --dup-rate 0.2
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - aggnet
    restart: "no" 
volumes:
  dedup_data:
    driver: local
networks:
  aggnet:
    driver: bridge
    internal: true
